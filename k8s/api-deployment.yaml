apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: betteruptime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: aabhii/betteruptime-init:amd64-latest
          command: ["/app/wait-for-postgres.sh", "postgres", "5432", "postgres"]
        - name: wait-for-redis
          image: aabhii/betteruptime-init:amd64-latest
          command: ["/app/wait-for-redis.sh", "redis", "6379"]
      containers:
        - name: api
          image: aabhii/betteruptime-backend:amd64-latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:postgres@postgres:5432/mydb"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: JWT_SECRET
              value: "secret"
            - name: PORT
              value: "3001"
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5