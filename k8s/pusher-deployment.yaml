apiVersion: apps/v1
kind: Deployment
metadata:
  name: pusher
  namespace: betteruptime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pusher
  template:
    metadata:
      labels:
        app: pusher
    spec:
      containers:
        - name: pusher
          image: aabhii/betteruptime-pusher:amd64-latest
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:postgres@postgres:5432/mydb"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"